name: Provider Metrics Monitor

# Live benchmark of search providers: measures each configured engine's LIMIT
# (fill-rate, 429/blocked, timeout, latency) and QUALITY (intrinsic heuristics,
# cross-engine consensus, labeled golden queries) against real APIs.
#
# The deterministic per-PR gate lives in ci.yml. This live monitor also fails
# when every measured provider is unhealthy or when a persisted baseline
# regresses, so a green run always means at least one provider actually worked.

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Cost ≈ providers × queries calls per run; keep the
    # query set small. Switch to a monthly cron ("0 6 1 * *") to cut spend further.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      num_results:
        description: Results requested per query
        required: false
        default: "10"
      exclude:
        description: Comma-separated engines to exclude (e.g. keyless scrapers)
        required: false
        default: "DuckDuckGo"
      queries:
        description: Path to a queries.json (relative to packages/opensearch)
        required: false
        default: "src/bench/fixtures/live-queries.json"

# Never let a manual run and a scheduled run double-spend API quota concurrently.
concurrency:
  group: provider-metrics-monitor
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  benchmark:
    name: Live benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      # Node 24 ships stable TypeScript type stripping, which the bench CLI relies
      # on to run src/bench/cli.ts directly without a build step.
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Find previous completed monitor run
        id: previous
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/monitor.yml/runs?status=completed&per_page=10" \
            --jq '.workflow_runs[0].id // empty')"
          echo "run-id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Restore previous metrics artifact
        if: steps.previous.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous.outputs.run-id }}
          pattern: provider-metrics*
          merge-multiple: true
          path: packages/opensearch/provider-monitor-previous

      - name: Prepare persistent monitor state
        run: |
          mkdir -p packages/opensearch/provider-monitor-state
          if [ -f packages/opensearch/provider-monitor-previous/baseline.json ]; then
            cp packages/opensearch/provider-monitor-previous/baseline.json \
              packages/opensearch/provider-monitor-state/baseline.json
          elif [ -f packages/opensearch/provider-monitor-previous/provider-metrics.json ]; then
            cp packages/opensearch/provider-monitor-previous/provider-metrics.json \
              packages/opensearch/provider-monitor-state/baseline.json
          fi
          if [ -f packages/opensearch/provider-monitor-previous/history.ndjson ]; then
            cp packages/opensearch/provider-monitor-previous/history.ndjson \
              packages/opensearch/provider-monitor-state/history.ndjson
          elif [ -f packages/opensearch/provider-monitor-previous/provider-metrics.ndjson ]; then
            cp packages/opensearch/provider-monitor-previous/provider-metrics.ndjson \
              packages/opensearch/provider-monitor-state/history.ndjson
          fi

      - name: Run live benchmark
        env:
          # One line per credential actually read by a provider. A missing secret
          # resolves to "" → that provider is simply absent and reported "skipped".
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BRIGHT_DATA_SERP_API_KEY: ${{ secrets.BRIGHT_DATA_SERP_API_KEY }}
          BRIGHT_DATA_SERP_ZONE: ${{ secrets.BRIGHT_DATA_SERP_ZONE }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          KAGI_API_KEY: ${{ secrets.KAGI_API_KEY }}
          KAGI_API_TOKEN: ${{ secrets.KAGI_API_TOKEN }}
          LINKUP_API_KEY: ${{ secrets.LINKUP_API_KEY }}
          MOJEEK_API_KEY: ${{ secrets.MOJEEK_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENSEARCH_ENABLE_OLLAMA: ${{ secrets.OLLAMA_API_KEY != '' && 'true' || 'false' }}
          OPENSEARCH_DISABLE_OLLAMA_LOCAL: "true"
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          VALYU_API_KEY: ${{ secrets.VALYU_API_KEY }}
          YOU_API_KEY: ${{ secrets.YOU_API_KEY }}
          NUM_RESULTS: ${{ github.event.inputs.num_results || '10' }}
          EXCLUDE: ${{ github.event.inputs.exclude || 'DuckDuckGo' }}
          QUERIES: ${{ github.event.inputs.queries || 'src/bench/fixtures/live-queries.json' }}
        run: |
          pnpm --filter @minpeter/opensearch bench:live -- \
            --num-results "${NUM_RESULTS}" \
            --exclude "${EXCLUDE}" \
            --queries "${QUERIES}" \
            --out provider-metrics.json \
            --markdown provider-metrics.md \
            --charts provider-metrics-charts \
            --history provider-monitor-state/history.ndjson \
            --baseline provider-monitor-state/baseline.json \
            --health-gate \
            --fail-on-regression

      - name: Promote healthy report to baseline
        if: success()
        run: |
          cp packages/opensearch/provider-metrics.json \
            packages/opensearch/provider-monitor-state/baseline.json

      - name: Write summary
        if: always()
        run: |
          if [ -f packages/opensearch/provider-metrics.md ]; then
            cat packages/opensearch/provider-metrics.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No metrics produced (no provider keys configured?).' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: provider-metrics-state
          retention-days: 90
          path: |
            packages/opensearch/provider-metrics.json
            packages/opensearch/provider-metrics.md
            packages/opensearch/provider-metrics-charts
            packages/opensearch/provider-monitor-state
