name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC provenance

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Validate release tooling
        run: pnpm run test:release

      - name: Build
        run: pnpm run build

      - name: Check whether this push will publish
        id: publish
        run: |
          if pnpm tegami check-publish; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              exit "$status"
            fi
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version or publish packages
        run: pnpm tegami ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Verify packages from the npm registry
        if: steps.publish.outputs.needed == 'true'
        run: pnpm verify:published
