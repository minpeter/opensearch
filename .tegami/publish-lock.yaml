core:changelogs:
  - content: "---\npackages:\n  npm:@minpeter/opensearch:\n    type: patch\n---\n\n### Bump undici to v8\n\nUpgrade the HTTP client from undici 7 to undici 8. No API changes —\n`Agent` and `Dispatcher` usage is unchanged. Requires Node >= 22.19.0.\n"
    filename: 2026-07-20-c3a3ee0c.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:opensearch-ai-sdk:\n    type: patch\n---\n\n### Adapt to ai SDK v7 types\n\nUpdate type definitions for ai SDK v7 compatibility:\n`ToolExecutionOptions` is now generic, `OpenSearchToolSet` no longer\nextends ai's `ToolSet` (index signature incompatibility), and method\nsignatures use property-style for stricter function type checking.\n"
    filename: 2026-07-20-c8e44592.md
    v: 0.0.0
